<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Дота-Шпион</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="page">
  <div class="logo">ДОТА&#8209;<span>ШПИОН</span></div>

  <div class="card">
    <div>
      <label>Твоё имя</label>
      <input type="text" id="nameInput" placeholder="Введи имя" maxlength="20"/>
    </div>

    <button class="btn btn-primary" id="btnCreate" onclick="createRoom()">🏠 Создать комнату</button>

    <div class="divider">или</div>

    <div>
      <label>Код комнаты</label>
      <input type="text" id="codeInput" placeholder="XXXX" maxlength="4" style="text-transform:uppercase;letter-spacing:4px;font-weight:700"/>
    </div>
    <button class="btn btn-secondary" id="btnJoin" onclick="joinRoom()">🚪 Войти в комнату</button>

    <div class="error-msg" id="errMsg"></div>
    <div style="font-size:.78rem;color:#8b949e;margin-top:8px;text-align:center" id="statusMsg"></div>
  </div>
</div>

<script src="ws-connect.js"></script>
<script>
  let ws;
  let connecting = false;

  function getClientId() {
    let id = localStorage.getItem('dotaspy_client_id');
    if (!id) { id = 'c_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('dotaspy_client_id', id); }
    return id;
  }


  function setButtonsDisabled(disabled) {
    document.getElementById('btnCreate').disabled = disabled;
    document.getElementById('btnJoin').disabled = disabled;
  }

  function connect(onOpen) {
    if (connecting) return;
    connecting = true;
    setButtonsDisabled(true);
    document.getElementById('errMsg').textContent = '';

    connectWithRetry({
      onStatus: text => { document.getElementById('statusMsg').textContent = text; },
      onOpen: socket => {
        ws = socket;
        connecting = false;
        setButtonsDisabled(false);
        onOpen(socket);
      },
      onMessage: e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'error') {
          document.getElementById('errMsg').textContent = msg.text;
          document.getElementById('statusMsg').textContent = '';
          connecting = false;
          setButtonsDisabled(false);
          return;
        }
        if (msg.type === 'created' || msg.type === 'joined') {
          sessionStorage.setItem('dotaspy_ws_id', msg.playerId);
          sessionStorage.setItem('dotaspy_code', msg.code);
          location.href = 'lobby.html';
        }
      },
    });
  }

  function createRoom() {
    const name = document.getElementById('nameInput').value.trim() || 'Хост';
    sessionStorage.setItem('dotaspy_name', name);
    connect(socket => socket.send(JSON.stringify({ type: 'create', name, clientId: getClientId() })));
  }

  function joinRoom() {
    const name = document.getElementById('nameInput').value.trim() || 'Игрок';
    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    if (!code) { document.getElementById('errMsg').textContent = 'Введи код комнаты'; return; }
    sessionStorage.setItem('dotaspy_name', name);
    connect(socket => socket.send(JSON.stringify({ type: 'join', name, code, clientId: getClientId() })));
  }
</script>
</body>
</html>
